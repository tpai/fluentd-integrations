# ── Source: tail sample app logs ─────────────────────────────────────────────
<source>
  @type tail
  path /fluentd/samples/app-logs.txt
  pos_file /fluentd/etc/app-logs.pos
  tag app.logs
  read_from_head true
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%SZ
  </parse>
</source>

# ── Filter: map severity level to CEF numeric value ──────────────────────────
<filter app.logs>
  @type record_transformer
  enable_ruby true
  <record>
    cef_severity ${{"DEBUG"=>3,"INFO"=>5,"WARN"=>6,"ERROR"=>8,"FATAL"=>10}[record["level"]] || 5}
  </record>
</filter>

# ── Filter: build CEF message string ─────────────────────────────────────────
<filter app.logs>
  @type record_transformer
  enable_ruby true
  <record>
    cef_message CEF:0|AcmeCorp|FluentdApp|1.0|${record["event"] || "APP-000"}|${(record["event"] || "application log").gsub("_"," ").split.map(&:capitalize).join(" ")}|${record["cef_severity"]}|src=${record["src"] || "-"} dst=${record["dst"] || "-"} suser=${record["suser"] || "-"} duser=${record["duser"] || "-"} msg=${(record["msg"] || "").gsub("\\","\\\\").gsub("=","\\=").gsub("|","\\|")} rt=${(Time.now.to_f * 1000).to_i} cs1=${record["namespace"] || "-"} cs1Label=namespace cs2=${record["service"] || "-"} cs2Label=service cs3=${record["pod"] || "-"} cs3Label=pod cs4=${record["trace_id"] || "-"} cs4Label=trace_id
  </record>
</filter>

# ── Match: send raw CEF to Graylog CEF TCP input ─────────────────────────────
<match app.logs>
  @type copy
  <store>
    @type tcp
    host "#{ENV['GRAYLOG_HOST'] || 'graylog'}"
    port "#{ENV['GRAYLOG_CEF_PORT'] || '5514'}"
    <format>
      @type single_value
      message_key cef_message
      add_newline true
    </format>
  </store>
  <store>
    @type stdout
  </store>
</match>
